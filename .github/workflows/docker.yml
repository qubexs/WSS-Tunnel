name: Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wss-server
        uses: docker/build-push-action@v5
        with:
          context: ./wss-server
          push: false
          tags: wss-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build wss-client
        uses: docker/build-push-action@v5
        with:
          context: ./wss-client
          push: false
          tags: wss-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/wss-server
            ghcr.io/${{ github.repository }}/wss-client
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=true

      - name: Build and push wss-server
        uses: docker/build-push-action@v5
        with:
          context: ./wss-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push wss-client
        uses: docker/build-push-action@v5
        with:
          context: ./wss-client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max